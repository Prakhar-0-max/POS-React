spring.application.name=backend
server.port=${SERVER_PORT:8080}

# MySQL Datasource Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:${MYSQLHOST:localhost}}:${DB_PORT:${MYSQLPORT:3306}}/${DB_NAME:${MYSQLDATABASE:pos_db}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASS:${MYSQLPASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4200}

# Jackson JSON Settings
spring.jackson.serialization.fail-on-empty-beans=false

# Server Error Handling
server.error.include-message=always
server.error.include-binding-errors=always